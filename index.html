<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style1.css" />
    <title>Shopper</title>
  </head>
  <body>
    <header class="header">
      <div id="firstline">
        <h1 id="logo"><span class="green">Shop</span>per</h1>
        <div class="search">
          <input type="text" placeholder="Search Items" class="poisk" />
          <button class="lupa">
            <img src="img/search-Filled.png" alt="search" />
          </button>
        </div>
        <div class="actions">
          <button class="crate">
            <img src="/img/Icon.png" alt="crate" class="icon" />
            <p class="forbutt">0 Items Added</p>
          </button>
          <button class="login">
            <img src="/img/Vector.png" alt="profile" class="icon" />
            <p class="forbutt">Login or Sign Up</p>
          </button>
        </div>
      </div>
      <div class="nav">
        <div class="navigation">
          <button class="navbutt">Features</button>
          <button class="navbutt">Products</button>
          <button class="navbutt">Blog</button>
          <button class="navbutt">About</button>
        </div>
      </div>
    </header>
  </body>
</html>
